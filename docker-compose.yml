version: '3.8'
services:
  mongodb:
    image: mongo:6
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - .env

  worker:
    build: ./backend
    command: node src/workers/payoutWorker.js
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env

  marketing-worker:
    build: ./backend
    command: node src/workers/marketingWorker.js
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env

  target-agent-worker:
    build: ./backend
    command: node src/workers/targetAgentWorker.js
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env

volumes:
  mongo_data:
