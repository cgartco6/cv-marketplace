version: '3.8'
services:
  mongodb:
    image: mongo:6
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - cv_network

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    networks:
      - cv_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env.production
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    networks:
      - cv_network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - cv_network
    restart: unless-stopped

  worker-payout:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: node src/workers/payoutWorker.js
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env.production
    networks:
      - cv_network
    restart: unless-stopped

  worker-marketing:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: node src/workers/marketingWorker.js
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env.production
    networks:
      - cv_network
    restart: unless-stopped

  worker-target:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: node src/workers/targetAgentWorker.js
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env.production
    networks:
      - cv_network
    restart: unless-stopped

  worker-selfhealing:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: node src/workers/selfHealingWorker.js
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env.production
    networks:
      - cv_network
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  cv_network:
    driver: bridge
